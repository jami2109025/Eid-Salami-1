<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Salami Generator 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700;800&family=Baloo+2:wght@700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A017;
  --gold-light: #F5C842;
  --gold-dark: #9A7210;
  --emerald: #0A4A2E;
  --emerald-mid: #0D6B42;
  --emerald-light: #1A8F58;
  --cream: #FDF6E3;
  --deep: #071A0F;
  --accent: #C0392B;
  --pink: #ff6eb4;
  --purple: #a855f7;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: #030c06;
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 100% 60% at 8% 0%, rgba(13,107,66,0.6) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 92% 100%, rgba(10,74,46,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(26,143,88,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 70% 20%, rgba(212,160,23,0.04) 0%, transparent 50%),
    linear-gradient(180deg, #030c06 0%, #061508 55%, #0a2214 100%);
  animation: skyBreath 12s ease-in-out infinite alternate;
}
@keyframes skyBreath { from { opacity: 0.9; } to { opacity: 1; } }

.aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.aurora-band {
  position: absolute; left: -20%; right: -20%; height: 180px;
  filter: blur(60px); opacity: 0.07;
  animation: auroraMove var(--am) ease-in-out infinite alternate;
}
@keyframes auroraMove {
  from { transform: translateY(0) scaleX(1); }
  to   { transform: translateY(40px) scaleX(1.15); }
}

.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.star {
  position: absolute; border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite alternate;
  animation-delay: var(--dl);
}
@keyframes twinkle {
  from { opacity: 0.05; transform: scale(0.6); }
  to   { opacity: 1; transform: scale(1.4); }
}

.shooting-star {
  position: fixed; pointer-events: none; z-index: 1; opacity: 0;
  width: 4px; height: 4px; background: #fff; border-radius: 50%;
}
.shooting-star::after {
  content: ''; position: absolute;
  top: 50%; right: 0; transform: translateY(-50%);
  width: 130px; height: 2px;
  background: linear-gradient(to left, rgba(255,255,255,0.95), transparent);
  border-radius: 2px;
}
@keyframes shoot {
  0%   { opacity: 1; transform: translate(0,0) rotate(30deg); }
  100% { opacity: 0; transform: translate(320px,200px) rotate(30deg); }
}

.floaty {
  position: fixed; pointer-events: none; z-index: 1;
  opacity: 0; user-select: none;
  animation: floatUp var(--pd) ease-in-out infinite;
  animation-delay: var(--delay);
}
@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(105vh) rotate(0deg) scale(0.7); }
  6%   { opacity: 0.8; }
  94%  { opacity: 0.25; }
  100% { opacity: 0; transform: translateY(-100px) rotate(600deg) scale(1.3); }
}

.pattern {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.028;
  background-image:
    repeating-linear-gradient(60deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%),
    repeating-linear-gradient(-60deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%);
  background-size: 48px 48px;
}

.lanterns {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-around;
  padding: 0 10px; pointer-events: none; z-index: 3;
}
.lantern-wrap {
  display: flex; flex-direction: column; align-items: center;
  animation: sway var(--sw) ease-in-out infinite alternate;
  transform-origin: top center;
}
@keyframes sway {
  from { transform: rotate(-9deg) translateX(-3px); }
  to   { transform: rotate(9deg) translateX(3px) translateY(12px); }
}
.lantern-string { width: 2px; height: 72px; background: linear-gradient(to bottom, rgba(212,160,23,0.8), rgba(212,160,23,0.05)); }
.lantern-body {
  width: 42px; height: 64px;
  border-radius: 12px 12px 22px 22px; position: relative;
  box-shadow: var(--ls); transition: box-shadow 0.3s;
}
.lantern-body::before, .lantern-body::after {
  content: ''; position: absolute; left: 50%; transform: translateX(-50%);
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
  border-radius: 4px;
}
.lantern-body::before { width: 48px; height: 8px; top: -6px; }
.lantern-body::after  { width: 48px; height: 8px; bottom: -6px; }
.lantern-lines { position: absolute; inset: 8px 6px; display: flex; justify-content: space-between; }
.lantern-line { width: 1px; background: rgba(255,255,255,0.1); border-radius: 1px; }
.lantern-glow {
  width: 12px; height: 16px; background: rgba(255,230,100,0.95);
  border-radius: 50%; margin: 0 auto; position: relative; top: 24px;
  animation: flicker var(--fl) ease-in-out infinite alternate;
}
@keyframes flicker {
  from { opacity: 0.45; transform: scale(0.75); box-shadow: 0 0 8px 4px rgba(255,230,100,0.35); }
  to   { opacity: 1; transform: scale(1.25); box-shadow: 0 0 24px 14px rgba(255,230,100,0.7); }
}
.lantern-tassel { width: 2px; height: 26px; background: linear-gradient(to bottom, var(--gold), transparent); margin: 0 auto; }

.moon {
  position: fixed; top: 14px; right: 28px; z-index: 3; pointer-events: none;
  animation: moonFloat 9s ease-in-out infinite alternate;
}
@keyframes moonFloat {
  from { transform: translateY(0) rotate(-4deg) scale(1); }
  to   { transform: translateY(14px) rotate(4deg) scale(1.04); }
}
.moon svg { filter: drop-shadow(0 0 35px rgba(245,200,66,0.95)) drop-shadow(0 0 70px rgba(245,200,66,0.4)); }

.lights-string {
  position: fixed; top: 0; left: 0; right: 0; height: 28px;
  pointer-events: none; z-index: 2;
  display: flex; align-items: flex-end; justify-content: space-around;
  padding: 0 5px;
}
@keyframes bulbFlicker {
  from { opacity: 0.5; filter: brightness(0.7); }
  to   { opacity: 1; filter: brightness(1.4); box-shadow: 0 0 8px 3px var(--bc); }
}

.container {
  position: relative; z-index: 10;
  max-width: 640px; margin: 0 auto;
  padding: 22px 18px 100px;
}

.header {
  text-align: center; padding: 68px 0 30px;
  animation: headerDrop 1s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes headerDrop {
  0%  { opacity: 0; transform: scale(0.5) translateY(-50px) rotate(-5deg); }
  70% { transform: scale(1.06) rotate(1deg); }
  100%{ opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
}

.header-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, rgba(212,160,23,0.15), rgba(212,160,23,0.06));
  border: 1px solid rgba(212,160,23,0.5);
  border-radius: 30px; padding: 7px 24px;
  font-size: 0.67rem; letter-spacing: 3.5px;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 20px;
  animation: badgePulse 3s ease-in-out infinite;
  position: relative; overflow: hidden;
}
.header-badge::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(212,160,23,0.1), transparent);
  transform: translateX(-100%);
  animation: badgeSweep 3s ease-in-out infinite;
}
@keyframes badgeSweep { to { transform: translateX(200%); } }
@keyframes badgePulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(212,160,23,0); }
  50%      { box-shadow: 0 0 28px 8px rgba(212,160,23,0.2); }
}

.subtitle {
  color: rgba(255,255,255,0.55); font-size: 0.78rem;
  font-weight: 300; letter-spacing: 4.5px;
  text-transform: uppercase; margin-top: 8px;
}

.tagline-funny {
  margin-top: 14px; font-family: 'Baloo 2', cursive;
  font-size: 1.05rem; color: var(--pink);
  display: inline-block;
  text-shadow: 0 0 25px rgba(255,110,180,0.6), 0 0 60px rgba(255,110,180,0.2);
  animation: taglineWiggle 1.8s ease-in-out infinite;
  background: rgba(255,110,180,0.06);
  border: 1px solid rgba(255,110,180,0.2);
  border-radius: 30px; padding: 5px 18px;
}
@keyframes taglineWiggle {
  0%   { transform: rotate(-2.5deg) scale(1); }
  25%  { transform: rotate(0deg) scale(1.03); }
  50%  { transform: rotate(2.5deg) scale(1); }
  75%  { transform: rotate(0deg) scale(1.03); }
  100% { transform: rotate(-2.5deg) scale(1); }
}

.divider { display: flex; align-items: center; gap: 14px; margin: 22px 0; }
.divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(212,160,23,0.8), transparent); }
.divider-icon { color: var(--gold); font-size: 1.2rem; animation: spinStar 10s linear infinite; display: block; }
@keyframes spinStar { to { transform: rotate(360deg); } }

.card {
  background: linear-gradient(150deg, rgba(255,255,255,0.075) 0%, rgba(255,255,255,0.025) 50%, rgba(212,160,23,0.03) 100%);
  border: 1px solid rgba(212,160,23,0.32);
  border-radius: 30px; padding: 46px 42px;
  backdrop-filter: blur(24px);
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset, 0 1px 0 rgba(255,255,255,0.12) inset, 0 -1px 0 rgba(0,0,0,0.2) inset;
  animation: cardRise 1s cubic-bezier(0.22,1,0.36,1) 0.15s both;
  position: relative; overflow: hidden;
}
@keyframes cardRise {
  from { opacity: 0; transform: translateY(60px) scale(0.94) rotateX(4deg); }
  to   { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
}
.card::before {
  content: ''; position: absolute; inset: 0; border-radius: 30px;
  background: linear-gradient(135deg, rgba(212,160,23,0) 0%, rgba(212,160,23,0.08) 30%, rgba(212,160,23,0) 60%, rgba(26,143,88,0.06) 100%);
  pointer-events: none;
}
.card-watermark {
  position: absolute; bottom: -30px; right: -20px;
  font-size: 14rem; opacity: 0.018; line-height: 1;
  pointer-events: none; user-select: none;
  animation: watermarkSpin 60s linear infinite;
}
@keyframes watermarkSpin { to { transform: rotate(360deg); } }

.card-title {
  font-family: 'Baloo 2', cursive;
  color: var(--gold-light); font-size: 1.35rem; font-weight: 800;
  margin-bottom: 30px; display: flex; align-items: center; gap: 10px;
  padding-bottom: 20px; border-bottom: 1px solid rgba(212,160,23,0.18);
  position: relative;
}
.card-title::after {
  content: ''; position: absolute; bottom: -1px; left: 0;
  width: 60px; height: 2px;
  background: linear-gradient(to right, var(--gold), transparent);
  border-radius: 2px;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 22px; }
.form-group { display: flex; flex-direction: column; gap: 9px; }
.form-group.full { grid-column: 1 / -1; }

label {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 2.2px; text-transform: uppercase;
  color: var(--gold); display: flex; align-items: center; gap: 8px;
}
label .dot {
  width: 7px; height: 7px; background: var(--gold);
  border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 10px rgba(212,160,23,0.9);
  animation: dotPulse 2s ease-in-out infinite alternate;
}
@keyframes dotPulse {
  from { transform: scale(0.7); opacity: 0.5; box-shadow: 0 0 4px rgba(212,160,23,0.5); }
  to   { transform: scale(1.4); opacity: 1; box-shadow: 0 0 14px rgba(212,160,23,1); }
}

.input-wrap { position: relative; }
.input-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 1.05rem; pointer-events: none; z-index: 1;
  opacity: 0.45; transition: all 0.25s;
}
.input-wrap:focus-within .input-icon { opacity: 1; transform: translateY(-50%) scale(1.15); }

input, select {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(212,160,23,0.16);
  border-radius: 15px; padding: 15px 15px 15px 46px;
  color: white; font-family: 'Poppins', sans-serif;
  font-size: 0.9rem; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  outline: none; width: 100%;
}
input.no-icon, select { padding-left: 18px; }
input::placeholder { color: rgba(255,255,255,0.2); font-style: italic; font-size: 0.88rem; }
input:focus, select:focus {
  border-color: var(--gold);
  background: rgba(212,160,23,0.07);
  box-shadow: 0 0 0 4px rgba(212,160,23,0.1), 0 10px 35px rgba(0,0,0,0.35);
  transform: translateY(-3px);
}
select option { background: #091505; color: white; }

.btn-wrap { position: relative; margin-top: 28px; }
.btn-glow-ring {
  position: absolute; inset: -5px; border-radius: 20px;
  background: conic-gradient(var(--gold), var(--gold-light), #2ecc71, var(--gold-light), var(--gold));
  opacity: 0; filter: blur(10px);
  animation: ringPulse 2.5s ease-in-out infinite; pointer-events: none;
}
@keyframes ringPulse {
  0%,100% { opacity: 0; transform: scale(0.98); }
  50%      { opacity: 0.55; transform: scale(1.02); }
}
.btn {
  width: 100%; padding: 20px 24px;
  background: linear-gradient(135deg, #7a5800 0%, var(--gold) 35%, var(--gold-light) 65%, var(--gold) 100%);
  background-size: 300% 300%;
  border: none; border-radius: 16px;
  color: #1a0a00; font-family: 'Baloo 2', cursive;
  font-size: 1.4rem; font-weight: 800; cursor: pointer;
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; overflow: hidden;
  box-shadow: 0 8px 32px rgba(212,160,23,0.45), 0 2px 0 rgba(255,255,255,0.25) inset, 0 -2px 0 rgba(0,0,0,0.15) inset;
  animation: btnFlow 4s ease-in-out infinite;
}
@keyframes btnFlow {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 15%, rgba(255,255,255,0.4) 50%, transparent 85%);
  transform: translateX(-200%); transition: transform 0.8s;
}
.btn:hover::before { transform: translateX(200%); }
.btn:hover {
  transform: translateY(-5px) scale(1.025);
  box-shadow: 0 20px 55px rgba(212,160,23,0.7), 0 2px 0 rgba(255,255,255,0.25) inset;
}
.btn:active { transform: translateY(-1px) scale(0.98); }
.btn-text { display: block; transition: opacity 0.2s; letter-spacing: 0.5px; }
.btn.loading .btn-text { opacity: 0; }
.btn-loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; gap: 8px; }
.btn.loading .btn-loader { opacity: 1; }
.loader-dot {
  width: 11px; height: 11px; background: #1a0a00;
  border-radius: 50%; animation: dotBounce 0.6s ease-in-out infinite alternate;
}
.loader-dot:nth-child(2) { animation-delay: 0.15s; }
.loader-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes dotBounce {
  from { transform: translateY(0) scale(0.8); opacity: 0.4; }
  to   { transform: translateY(-10px) scale(1.1); opacity: 1; }
}

.result { display: none; margin-top: 36px; text-align: center; }
.result.show { display: block; animation: resultBoom 0.8s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes resultBoom {
  0%  { opacity: 0; transform: scale(0.4) rotate(-8deg); }
  55% { transform: scale(1.08) rotate(2deg); }
  75% { transform: scale(0.97) rotate(-1deg); }
  100%{ opacity: 1; transform: scale(1) rotate(0deg); }
}

.result-outer {
  position: relative;
  background: linear-gradient(145deg, rgba(212,160,23,0.13) 0%, rgba(212,160,23,0.04) 40%, rgba(26,143,88,0.07) 100%);
  border: 2.5px solid transparent;
  border-radius: 26px; padding: 40px 30px;
  overflow: hidden;
  background-clip: padding-box;
  box-shadow: 0 0 0 2.5px var(--gold), 0 0 30px rgba(212,160,23,0.3), 0 20px 60px rgba(0,0,0,0.4);
}
.corner { position: absolute; font-size: 1.4rem; color: rgba(212,160,23,0.4); line-height: 1; }
.corner.tl { top: 10px; left: 14px; animation: spinStar 10s linear infinite; }
.corner.tr { top: 10px; right: 14px; animation: spinStar 10s linear infinite reverse; }
.corner.bl { bottom: 10px; left: 14px; animation: spinStar 14s linear infinite reverse; }
.corner.br { bottom: 10px; right: 14px; animation: spinStar 14s linear infinite; }

.result-bg-emoji {
  position: absolute; font-size: 13rem; opacity: 0.035;
  top: -30px; right: -30px; pointer-events: none; line-height: 1;
  animation: bgEmojiSpin 40s linear infinite;
}
@keyframes bgEmojiSpin { to { transform: rotate(360deg) scale(1.1); } }

.confetti-line {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71, #3498db, #9b59b6, #e74c3c);
  background-size: 200% 100%;
  animation: rainbowSlide 2s linear infinite;
  border-radius: 26px 26px 0 0;
}
@keyframes rainbowSlide { to { background-position: -200% 0; } }

.congrats-line {
  font-family: 'Amiri', serif; color: var(--gold-light);
  font-size: 1.15rem; font-style: italic; opacity: 0.85; margin-bottom: 4px;
}
.junior-name {
  font-family: 'Baloo 2', cursive; font-size: 2.4rem;
  color: white; font-weight: 800; margin-bottom: 16px;
  text-shadow: 0 2px 18px rgba(0,0,0,0.5), 0 0 40px rgba(212,160,23,0.15);
  animation: nameWobble 3s ease-in-out infinite alternate;
}
@keyframes nameWobble {
  from { letter-spacing: 0px; transform: scale(1); }
  to   { letter-spacing: 3px; transform: scale(1.02); }
}

.funny-badge {
  display: inline-block;
  border-radius: 999px; padding: 7px 22px;
  font-family: 'Baloo 2', cursive;
  font-size: 0.95rem; font-weight: 800;
  margin-bottom: 22px; letter-spacing: 0.5px;
  animation: badgeBoom 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
  position: relative; overflow: hidden;
}
.funny-badge::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  animation: badgeSweep 2.5s ease-in-out infinite 1s;
}
@keyframes badgeBoom {
  from { opacity: 0; transform: scale(0) rotate(-15deg); }
  60%  { transform: scale(1.15) rotate(3deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

.amount-label {
  font-size: 0.63rem; letter-spacing: 4.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.32); margin-bottom: 10px;
}
.amount-display { position: relative; display: inline-block; }
.amount-display::before, .amount-display::after {
  content: '✦'; position: absolute; top: 50%; transform: translateY(-50%);
  color: var(--gold); opacity: 0.7; font-size: 1.4rem;
}
.amount-display::before { left: -34px; animation: spinStar 8s linear infinite; }
.amount-display::after  { right: -34px; animation: spinStar 8s linear infinite reverse; }

.amount {
  font-family: 'Baloo 2', cursive; font-size: 6.5rem;
  color: var(--gold-light); line-height: 1; font-weight: 800;
  animation: amountPop 2.5s ease-in-out infinite alternate;
  display: inline-block;
}
@keyframes amountPop {
  from { text-shadow: 0 0 20px rgba(212,160,23,0.5), 0 4px 8px rgba(0,0,0,0.4); transform: scale(1); }
  to   { text-shadow: 0 0 80px rgba(212,160,23,1), 0 0 160px rgba(212,160,23,0.4), 0 4px 8px rgba(0,0,0,0.4); transform: scale(1.05); }
}
.currency { font-size: 3.2rem; vertical-align: middle; margin-right: 6px; opacity: 0.85; }

.funny-note {
  margin: 22px auto 0; max-width: 440px;
  font-size: 0.92rem; color: rgba(255,255,255,0.62);
  line-height: 1.65; font-style: italic;
  padding: 16px 20px 16px 28px;
  background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(212,160,23,0.03));
  border-radius: 16px; border-left: 4px solid var(--gold-dark);
  position: relative;
  animation: noteSlide 0.6s cubic-bezier(0.22,1,0.36,1) 0.4s both;
  text-align: left;
}
@keyframes noteSlide {
  from { opacity: 0; transform: translateX(-30px); }
  to   { opacity: 1; transform: translateX(0); }
}
.funny-note::before {
  content: '"'; position: absolute; top: -4px; left: 10px;
  font-size: 3rem; color: var(--gold-dark); font-family: 'Amiri', serif; line-height: 1; opacity: 0.6;
}
.funny-note::after {
  content: '"'; position: absolute; bottom: -18px; right: 14px;
  font-size: 3rem; color: var(--gold-dark); font-family: 'Amiri', serif; line-height: 1; opacity: 0.35;
}

.info-pills { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 24px; }
.pill {
  background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px; padding: 6px 20px;
  font-size: 0.78rem; color: rgba(255,255,255,0.5);

// ── Toast ──
function showToast(msg) {
  const ex = document.querySelector('.toast');
  if (ex) ex.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.cssText = `
    position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);
    background:linear-gradient(135deg,rgba(192,57,43,0.95),rgba(231,76,60,0.9));
    color:white;padding:13px 28px;border-radius:999px;font-size:0.9rem;z-index:9999;
    animation:toastPop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
    box-shadow:0 10px 30px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.1) inset;
    font-family:'Baloo 2',cursive;font-weight:700;white-space:nowrap;
    backdrop-filter:blur(10px);
  `;
  document.body.appendChild(t);
  const st = document.createElement('style');
  st.textContent = `@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(0.8)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}`;
  document.head.appendChild(st);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px) scale(0.9)'; t.style.transition='all 0.3s'; setTimeout(()=>t.remove(),350); }, 2800);
}

// ── Cry emojis for tiny salami 😭 ──
function launchCryEmojis() {
  for (let i = 0; i < 25; i++) {
    const e = document.createElement('div');
    e.textContent = ['😭','💔','🥺','😢','💸'][i % 5];
    const sz = 1.4 + Math.random() * 1;
    e.style.cssText = `position:fixed;font-size:${sz}rem;left:${Math.random()*100}%;top:-40px;pointer-events:none;z-index:999;--fd:${1.8+Math.random()*2}s;--fdelay:${Math.random()*1.8}s;--frot:${360+Math.random()*360}deg;animation:confFall var(--fd) ease-in var(--fdelay) forwards;`;
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 5000);
  }
}

function shakeCard() {
  const card = document.querySelector('.card');
  card.style.animation = 'shake 0.6s ease';
  setTimeout(() => card.style.animation = '', 750);
}

function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#D4A017','#F5C842','#0D6B42','#C0392B','#fff','#8e44ad','#2ecc71','#3498db','#ff6eb4','#fdcb6e','#1abc9c','#e74c3c'];
  const shapes = ['50%', '3px', '0', '40% 0', '50% 0 0 50%'];
  for (let i = 0; i < 140; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[i % colors.length];
    const w = 6 + Math.random() * 14;
    const h = 6 + Math.random() * 14;
    const rot = 360 + Math.floor(Math.random() * 1080);
    piece.style.cssText = `left:${Math.random()*100}%;top:-16px;background:${color};border-radius:${shapes[i%shapes.length]};width:${w}px;height:${h}px;--fd:${2.8+Math.random()*3}s;--fdelay:${Math.random()*2.8}s;--frot:${rot}deg;`;
    container.appendChild(piece);
  }
}
